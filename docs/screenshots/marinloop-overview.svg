<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">MarinLoop product overview</title>
  <desc id="desc">A product overview graphic showing medication timeline, reminders, care network, and trust controls.</desc>
  <rect width="1200" height="760" rx="32" fill="#F3F7F3"/>
  <rect x="40" y="40" width="1120" height="680" rx="28" fill="url(#bg)"/>
  <rect x="84" y="84" width="356" height="592" rx="28" fill="#0E3B2E"/>
  <rect x="472" y="84" width="312" height="280" rx="28" fill="#FFFFFF" fill-opacity="0.94"/>
  <rect x="816" y="84" width="300" height="280" rx="28" fill="#FFFFFF" fill-opacity="0.94"/>
  <rect x="472" y="396" width="644" height="280" rx="28" fill="#FFFFFF" fill-opacity="0.94"/>
  <text x="92" y="128" fill="#D6F2E5" font-family="Arial, sans-serif" font-size="20" font-weight="700">MarinLoop</text>
  <text x="92" y="164" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="42" font-weight="700">Personal medication</text>
  <text x="92" y="208" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="42" font-weight="700">tracking with clear</text>
  <text x="92" y="252" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="42" font-weight="700">clinical boundaries.</text>
  <text x="92" y="306" fill="#C4DDD2" font-family="Arial, sans-serif" font-size="20">For patients and caregivers. Not for diagnosis, treatment,</text>
  <text x="92" y="334" fill="#C4DDD2" font-family="Arial, sans-serif" font-size="20">emergency response, or covered-entity deployment in this beta.</text>
  <rect x="92" y="384" width="340" height="78" rx="18" fill="#174C3B"/>
  <text x="118" y="418" fill="#E8FFF4" font-family="Arial, sans-serif" font-size="18" font-weight="700">Timeline and dose logging</text>
  <text x="118" y="446" fill="#C7E7D9" font-family="Arial, sans-serif" font-size="16">Track scheduled doses, adherence, and refill timing.</text>
  <rect x="92" y="478" width="340" height="78" rx="18" fill="#174C3B"/>
  <text x="118" y="512" fill="#E8FFF4" font-family="Arial, sans-serif" font-size="18" font-weight="700">Caregiver coordination</text>
  <text x="118" y="540" fill="#C7E7D9" font-family="Arial, sans-serif" font-size="16">Share routines, contacts, and emergency reference info.</text>
  <rect x="92" y="572" width="340" height="78" rx="18" fill="#174C3B"/>
  <text x="118" y="606" fill="#E8FFF4" font-family="Arial, sans-serif" font-size="18" font-weight="700">Consent and privacy controls</text>
  <text x="118" y="634" fill="#C7E7D9" font-family="Arial, sans-serif" font-size="16">AI is opt-in. Core tracking works without AI.</text>
  <text x="500" y="126" fill="#174C3B" font-family="Arial, sans-serif" font-size="24" font-weight="700">Daily adherence flow</text>
  <rect x="500" y="152" width="256" height="60" rx="16" fill="#EDF5EF"/>
  <text x="520" y="189" fill="#174C3B" font-family="Arial, sans-serif" font-size="18" font-weight="700">8:00 AM  Lisinopril 10mg</text>
  <rect x="500" y="224" width="256" height="60" rx="16" fill="#EDF5EF"/>
  <text x="520" y="261" fill="#174C3B" font-family="Arial, sans-serif" font-size="18" font-weight="700">12:00 PM  Metformin 500mg</text>
  <rect x="500" y="296" width="256" height="40" rx="14" fill="#174C3B"/>
  <text x="560" y="322" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="16" font-weight="700">Mark dose taken</text>
  <text x="844" y="126" fill="#174C3B" font-family="Arial, sans-serif" font-size="24" font-weight="700">Trust controls</text>
  <circle cx="852" cy="174" r="8" fill="#2E7D5A"/>
  <text x="872" y="180" fill="#174C3B" font-family="Arial, sans-serif" font-size="18">Not a medical device</text>
  <circle cx="852" cy="216" r="8" fill="#2E7D5A"/>
  <text x="872" y="222" fill="#174C3B" font-family="Arial, sans-serif" font-size="18">Best-effort reminders only</text>
  <circle cx="852" cy="258" r="8" fill="#2E7D5A"/>
  <text x="872" y="264" fill="#174C3B" font-family="Arial, sans-serif" font-size="18">AI consent required</text>
  <circle cx="852" cy="300" r="8" fill="#2E7D5A"/>
  <text x="872" y="306" fill="#174C3B" font-family="Arial, sans-serif" font-size="18">RLS and server-side AI</text>
  <text x="500" y="438" fill="#174C3B" font-family="Arial, sans-serif" font-size="24" font-weight="700">What reviewers can evaluate quickly</text>
  <rect x="500" y="468" width="188" height="176" rx="20" fill="#EDF5EF"/>
  <text x="520" y="506" fill="#174C3B" font-family="Arial, sans-serif" font-size="20" font-weight="700">Testers</text>
  <text x="520" y="538" fill="#174C3B" font-family="Arial, sans-serif" font-size="16">Onboarding</text>
  <text x="520" y="564" fill="#174C3B" font-family="Arial, sans-serif" font-size="16">Medication setup</text>
  <text x="520" y="590" fill="#174C3B" font-family="Arial, sans-serif" font-size="16">Dose logging</text>
  <text x="520" y="616" fill="#174C3B" font-family="Arial, sans-serif" font-size="16">Push reminders</text>
  <rect x="700" y="468" width="188" height="176" rx="20" fill="#EDF5EF"/>
  <text x="720" y="506" fill="#174C3B" font-family="Arial, sans-serif" font-size="20" font-weight="700">Clinicians</text>
  <text x="720" y="538" fill="#174C3B" font-family="Arial, sans-serif" font-size="16">Safety boundary</text>
  <text x="720" y="564" fill="#174C3B" font-family="Arial, sans-serif" font-size="16">Consent flow</text>
  <text x="720" y="590" fill="#174C3B" font-family="Arial, sans-serif" font-size="16">Data handling</text>
  <text x="720" y="616" fill="#174C3B" font-family="Arial, sans-serif" font-size="16">Human review</text>
  <rect x="900" y="468" width="188" height="176" rx="20" fill="#EDF5EF"/>
  <text x="920" y="506" fill="#174C3B" font-family="Arial, sans-serif" font-size="20" font-weight="700">Partners</text>
  <text x="920" y="538" fill="#174C3B" font-family="Arial, sans-serif" font-size="16">Typed React app</text>
  <text x="920" y="564" fill="#174C3B" font-family="Arial, sans-serif" font-size="16">Supabase RLS</text>
  <text x="920" y="590" fill="#174C3B" font-family="Arial, sans-serif" font-size="16">Edge Functions</text>
  <text x="920" y="616" fill="#174C3B" font-family="Arial, sans-serif" font-size="16">CI and testing</text>
  <defs>
    <linearGradient id="bg" x1="40" y1="40" x2="1160" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#DCEFE2"/>
      <stop offset="1" stop-color="#CDE2D7"/>
    </linearGradient>
  </defs>
</svg>
