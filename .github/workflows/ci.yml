name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: detect --no-git --source . --redact

  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test suite with coverage report
        run: npm run test:coverage

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder-anon-key
          VITE_VAPID_PUBLIC_KEY: placeholder-vapid-key
          VITE_OAUTH_REDIRECT_URL: https://placeholder.example.com/auth/callback
          VITE_OPENAI_MODEL: gpt-5-nano
          VITE_SENTRY_DSN: ''
          VITE_ADMIN_USER_ID: ''

      - name: Check bundle size
        run: |
          node -e "
            const fs = require('fs');
            const path = require('path');
            const assetsDir = 'dist/assets';
            const files = fs.readdirSync(assetsDir).filter(f => f.endsWith('.js'));
            if (!files.length) { console.error('No JS chunks found'); process.exit(1); }
            let oversized = [];
            files.forEach(f => {
              const kb = fs.statSync(path.join(assetsDir, f)).size / 1024;
              console.log(f + ': ' + kb.toFixed(1) + ' KB');
              if (kb > 750) oversized.push(f + ' (' + kb.toFixed(1) + ' KB)');
            });
            if (oversized.length) { console.error('Chunks exceed 750 KB: ' + oversized.join(', ')); process.exit(1); }
            console.log('Bundle size OK');
          "

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [secret-scan, ci]
    if: github.event_name == 'pull_request' && secrets.E2E_TEST_EMAIL != ''
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_VAPID_PUBLIC_KEY: ${{ secrets.VITE_VAPID_PUBLIC_KEY }}
          VITE_OAUTH_REDIRECT_URL: https://marinloop.com/auth/callback
          VITE_OPENAI_MODEL: gpt-5-nano
          VITE_SENTRY_DSN: ''
          VITE_ADMIN_USER_ID: ''

      - name: Preview server & run E2E tests
        run: npx vite preview --port 5173 & sleep 3 && PLAYWRIGHT_BASE_URL=http://localhost:5173 npm run test:e2e
        env:
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
          E2E_INVITE_CODE: ${{ secrets.E2E_INVITE_CODE }}

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  deploy-functions:
    runs-on: ubuntu-latest
    needs: [secret-scan, ci]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Functions
        run: |
          supabase functions deploy openai-chat --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase functions deploy extract-label --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase functions deploy send-push --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase functions deploy cron-dispatch-push --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Set Edge Function Secrets
        run: |
          supabase secrets set \
            VAPID_PUBLIC_KEY="${{ secrets.VAPID_PUBLIC_KEY }}" \
            VAPID_PRIVATE_KEY="${{ secrets.VAPID_PRIVATE_KEY }}" \
            VAPID_SUBJECT="${{ secrets.VAPID_SUBJECT }}" \
            MEDFLOW_SERVICE_ROLE_KEY="${{ secrets.MEDFLOW_SERVICE_ROLE_KEY }}" \
            OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
            ALLOWED_ORIGINS="${{ secrets.ALLOWED_ORIGINS }}" \
            --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  lighthouse:
    name: Lighthouse CI
    needs: [secret-scan, ci]
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'placeholder' }}
          VITE_VAPID_PUBLIC_KEY: ${{ secrets.VITE_VAPID_PUBLIC_KEY || 'placeholder' }}

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: '.lighthouserc.json'
          uploadArtifacts: true
          temporaryPublicStorage: true
